<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>이동 중...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .box { text-align: center; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ddd;
      border-top-color: #e74c3c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>상품 페이지로 이동 중...</p>
</div>
<script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');

    if (!id) {
      window.location.href = 'https://www.coupang.com';
      return;
    }

    var LINKS_URL = 'https://raw.githubusercontent.com/tittue/cps-redirect/main/links.json';
    var fallback  = 'https://www.coupang.com/vp/products/' + id;

    // links.json 에서 내 파트너스 단축링크 찾기
    var xhr = new XMLHttpRequest();
    xhr.open('GET', LINKS_URL + '?t=' + Date.now(), true); // 캐시 방지
    xhr.timeout = 5000;

    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var db = JSON.parse(xhr.responseText);
          // db 구조: { "상품ID": { "title": "...", "link": "https://link.coupang.com/a/xxx" } }
          if (db[id] && db[id].link) {
            window.location.href = db[id].link; // 내 파트너스 링크로!
            return;
          }
        } catch(e) {}
      }
      window.location.href = fallback; // 없으면 직링크
    };

    xhr.onerror = function() { window.location.href = fallback; };
    xhr.ontimeout = function() { window.location.href = fallback; };

    xhr.send();
  })();
</script>
</body>
</html>
